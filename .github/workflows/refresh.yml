name: Refresh data

# Rebuilds the match data on a schedule (and on demand), pushes it to Supabase,
# and commits the refreshed web/data.js back so the static demo redeploys.
on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch: {}     # manual run from the Actions tab

permissions:
  contents: write           # allow committing the refreshed data.js back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the pipeline
        working-directory: src
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py

      - name: Commit refreshed data.js (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data.js
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh match data [skip ci]"
            git push
          fi
